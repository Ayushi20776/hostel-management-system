<!DOCTYPE html>
<html>
<head>
    <title>Receipt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 text-center">

        <h2 class="text-success">Payment Successful ✅</h2>

        <h4 class="mb-3">🧾 Receipt</h4>

        <p><strong>Student:</strong> {{ fee.student }}</p>
        <p><strong>Amount:</strong> ₹{{ fee.amount }}</p>
        <p><strong>Payment Method:</strong> {{ fee.payment_method }}</p>
        <p><strong>Date:</strong> {{ fee.date }}</p>

        <button onclick="window.print()" class="btn btn-primary mt-3">
            Generate Slip
        </button>

        <br><br>

        <a href="/add-fee/" class="btn btn-success">
            Pay Again
        </a>

    </div>
</div>

</body>
</html>
