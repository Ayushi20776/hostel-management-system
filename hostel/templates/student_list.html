{% extends 'base.html' %}

{% block content %}

<h2>Students List</h2>

<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.phone }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
